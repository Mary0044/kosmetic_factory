<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завод косметики | Цены</title>
    <style>
        body {
            background: linear-gradient(rgba(13, 45, 57, 0.7), rgba(8, 28, 29, 0.7)),
                        url('fon.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #24bec9;
            font-family: 'Courier New', monospace;
            margin: 20px;
            padding: 20px;
            border: 2px solid #00ff00;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            border-bottom: 1px dashed #00ff00;
            padding-bottom: 10px;
        }
        h2 {
            text-align: center;
            margin-top: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #00ff00;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #003300;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00ff00;
            text-decoration: none;
            border: 1px solid #00ff00;
            padding: 5px 15px;
        }
        .back-link:hover {
            background-color: #00ff00;
            color: black;
        }
    </style>
</head>
<body>
    <h1>Завод косметической продукции</h1>
    <h2>Товары и цены</h2>
    <table>
        <thead>
            <tr>
                <th>Название</th>
                <th>Цена (BYN)</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>Крем для лица</td><td>25.00</td></tr>
            <tr><td>Шампунь "Шёлк"</td><td>18.00</td></tr>
            <tr><td>Маска для волос</td><td>22.50</td></tr>
            <tr><td>Гель для душа</td><td>15.00</td></tr>
        </tbody>
    </table>
    <a href="index.html" class="back-link">← Back</a>
</body>
</html>
