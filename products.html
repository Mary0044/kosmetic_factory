<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завод косметики | Товары</title>
    <style>
        body {
            background: linear-gradient(rgba(7, 45, 48, 0.7), rgba(17, 44, 56, 0.7)),
                        url('fon.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            margin: 20px;
            padding: 20px;
            border: 2px solid #00ff00;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            border-bottom: 1px dashed #00ff00;
            padding-bottom: 10px;
        }
        h2 {
            text-align: center;
            margin-top: 5px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            padding: 8px;
            border-bottom: 1px dashed #00ff00;
        }
        li::before {
            content: "• ";
            color: #00ff00;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00ff00;
            text-decoration: none;
            border: 1px solid #00ff00;
            padding: 5px 15px;
        }
        .back-link:hover {
            background-color: #00ff00;
            color: black;
        }
    </style>
</head>
<body>
    <h1>Завод косметической продукции</h1>
    <h2>Товары для продажи:</h2>
    <ul>
        <li>Крем для лица</li>
        <li>Шампунь "Шёлк"</li>
        <li>Маска для волос</li>
        <li>Гель для душа</li>
    </ul>
    <a href="index.html" class="back-link">← Back</a>
</body>
</html>
